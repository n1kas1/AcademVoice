name: academ-voice

# Архитектура:
# - api  : FastAPI на 8000 (внутренний)
# - web  : Caddy 2 со статикой Vite-фронта + проксированием бэк-эндпоинтов
# - БД   : внешний Supabase (через DATABASE_URL)

services:
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DATABASE_URL: ${DATABASE_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    expose:
      - "8000"

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    # web (Caddy) обслуживает и academ4i.duckdns.org -> academ4i-backend:8000.
    # 'default' указан явно намеренно: как только у сервиса появляется секция networks,
    # автоподключение к default отключается, и без него web потеряет связь с api.
    networks:
      - default
      - academ4i

volumes:
  caddy_data:
  caddy_config:

networks:
  # Сеть academ4i_default создаётся СОСЕДНИМ проектом academ4i (/root/academ4i).
  # Подключаемся к ней как external, чтобы Caddy резолвил academ4i-backend.
  # ВАЖНО: стек academ4i должен быть запущен ДО деплоя academ-voice,
  # иначе 'docker compose up' упадёт fail-fast (см. guard в deploy.sh).
  academ4i:
    external: true
    name: academ4i_default
