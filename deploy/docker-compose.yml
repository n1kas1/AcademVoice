name: academ-voice

# Архитектура:
# - api  : FastAPI на 8000 (внутренний)
# - web  : Caddy 2 со статикой Vite-фронта + проксированием бэк-эндпоинтов
# - БД   : внешний Supabase (через DATABASE_URL)

services:
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DATABASE_URL: ${DATABASE_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    expose:
      - "8000"

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
